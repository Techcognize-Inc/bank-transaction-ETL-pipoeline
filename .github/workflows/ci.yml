name: DE1 Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark

      - name: Compile Spark jobs
        run: |
          python -m py_compile spark_jobs/ingest_csv.py
          python -m py_compile spark_jobs/quality_check.py
          python -m py_compile spark_jobs/transform.py
          python -m py_compile spark_jobs/aggregate.py

      - name: Validate docker compose
        run: |
          docker compose config